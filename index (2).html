<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Token con DOM</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; /* Cambiado a 0 para evitar márgenes extraños */
            background-color: #f4f6f9; 
            
            /* Truco de Flexbox para centrar todo */
            display: flex;
            justify-content: center; /* Centrado horizontal */
            align-items: center;     /* Centrado vertical */
            min-height: 100vh;       /* Toma todo el alto de la pantalla */
        }
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            max-width: 400px; 
            width: 100%; /* Asegura que responda bien en pantallas pequeñas */
        }
        .token-box { 
            margin-top: 15px; 
            padding: 10px; 
            background: #e8f4fd; 
            border-left: 5px solid #2196F3; 
            font-family: monospace; 
            word-break: break-all; 
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card"><center>
        <h2>Práctica Generador de Token</h2>
        <h2>Nombre del alumno: xxxxxxxxxxxxxxxxxxx</h2>
        <p>Introduce tu correo para simular la creación de un token de seguridad:</p>
        
        <input type="email" id="emailInput" placeholder="correo@ejemplo.com" style="width: 90%; padding: 8px; margin-bottom: 10px;">
        <br>
        <centar><button id="btnGenerar" style="padding: 10px 15px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer;">
            Generar Token
        </button>

        <div id="resultadoContenedor" class="hidden">
            <h4>Tu Token Equivalente:</h4>
            <div id="tokenOutput" class="token-box"></div>
        </div></center>
    </div>

    <script src="app.js"></script>
</body>
</html>
